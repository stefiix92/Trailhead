name: ci

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build_test_coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Build entrypoints (guardrail)
        run: make build

      - name: Test (with coverage)
        run: |
          go test ./... -coverprofile=cover.out
          echo ""
          echo "Coverage summary:"
          total_line=$(go tool cover -func=cover.out | tail -n 1)
          echo "$total_line"

          # Enforce a minimum total coverage floor (raise over time).
          min_cov="50.0"
          pct=$(echo "$total_line" | awk '{gsub(/%/,"",$NF); print $NF}')
          echo "Total coverage: ${pct}% (min ${min_cov}%)"
          awk -v pct="$pct" -v min="$min_cov" 'BEGIN{exit !(pct+0 >= min+0)}' || {
            echo "Coverage gate failed: ${pct}% < ${min_cov}%"
            exit 1
          }

          # Optional HTML report for easier inspection.
          go tool cover -html=cover.out -o cover.html

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverprofile
          path: cover.out
          if-no-files-found: error

      - name: Upload coverage HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: cover.html
          if-no-files-found: error

