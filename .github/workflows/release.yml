name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build_release_assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archives (linux/darwin, amd64/arm64)
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          build_one() {
            local goos="$1"
            local goarch="$2"
            local outdir="dist/trailhead_${VERSION}_${goos}_${goarch}"
            mkdir -p "$outdir"

            echo "Building ${goos}/${goarch}..."
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w -X github.com/stefiix92/Trailhead/internal/version.Version=${VERSION}" \
              -o "$outdir/trailhead-mcp" ./cmd/trailhead-mcp

            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w -X github.com/stefiix92/Trailhead/internal/version.Version=${VERSION}" \
              -o "$outdir/trailhead" ./cmd/trailhead

            chmod +x "$outdir/trailhead-mcp" "$outdir/trailhead"
            tar -C dist -czf "dist/trailhead_${VERSION}_${goos}_${goarch}.tar.gz" "trailhead_${VERSION}_${goos}_${goarch}"
            rm -rf "$outdir"
          }

          build_one linux amd64
          build_one linux arm64
          build_one darwin amd64
          build_one darwin arm64

          (cd dist && shasum -a 256 *.tar.gz > checksums.txt)

      - name: Upload GitHub Release (assets + notes)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt

  publish_ghcr:
    runs-on: ubuntu-latest
    needs: [build_release_assets]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
